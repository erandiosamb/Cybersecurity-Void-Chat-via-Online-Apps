<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #121212; color: white; }
        .container { max-width: 500px; margin: auto; }
        textarea, input { width: 100%; margin: 10px 0; padding: 10px; border-radius: 5px; border: 1px solid #333; background: #222; color: rgb(0, 255, 255); }
        button { width: 48%; padding: 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        .output { background: #000; padding: 15px; border: 1px dashed #555; word-break: break-all; margin-top: 20px; color: rgb(0, 255, 255); }
    </style>
</head>
<body>
    <div class="container">
        <h2>🛡️ Private Chat</h2>
        <input type="password" id="passphrase" placeholder="Write your keyphrase here">
        <textarea id="message" rows="4" placeholder="Paste the message here..."></textarea>
        
        <div style="display: flex; justify-content: space-between;">
            <button onclick="processMessage(true)">Encrypt</button>
            <button onclick="processMessage(false)" style="background: #1c2892;">Decrypt</button>
        </div>

        <div class="output" id="result">Encrypted or decrypted message will appear here...</div>
    </div>

    <script>
        // AES-256-GCM algorithm
        const SALT = new TextEncoder().encode("Enter your keyphrase here");
        const ITERATIONS = 100000;

        async function deriveKeyFromPassphrase(passphrase) {
            const encoder = new TextEncoder();
            const baseKey = await crypto.subtle.importKey("raw", encoder.encode(passphrase), "PBKDF2", false, ["deriveKey"]);
            return crypto.subtle.deriveKey(
                { name: "PBKDF2", salt: SALT, iterations: ITERATIONS, hash: "SHA-256" },
                baseKey,
                { name: "AES-GCM", length: 256 },
                false, ["encrypt", "decrypt"]
            );
        }

        async function processMessage(isEncrypting) {
            const passphrase = document.getElementById('passphrase').value;
            const text = document.getElementById('message').value;
            if(!passphrase || !text) return alert("Fill in all fields");

            try {
                const key = await deriveKeyFromPassphrase(passphrase);
                if (isEncrypting) {
                    const iv = crypto.getRandomValues(new Uint8Array(12));
                    const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, new TextEncoder().encode(text));
                    const result = new Uint8Array([...iv, ...new Uint8Array(encrypted)]);
                    document.getElementById('result').innerText = Array.from(result).map(b => b.toString(16).padStart(2, '0')).join('');
                } else {
                    const data = new Uint8Array(text.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
                    const iv = data.slice(0, 12);
                    const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, data.slice(12));
                    document.getElementById('result').innerText = new TextDecoder().decode(decrypted);
                }
            } catch (e) {
                document.getElementById('result').innerText = "⚠️ Error: Incorrect passphrase or corrupted data.";
            }
        }
    </script>
</body>
</html>
